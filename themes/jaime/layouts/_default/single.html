{{ define "main" }}
<article class="prose">
  {{ if not .Params.hideTitle }}
  <header class="page-header">
    <h1 class="page-title">{{ .Title }}</h1>
    {{ with .Params.subtitle }}<p class="page-subtitle">{{ . }}</p>{{ end }}
  </header>
  {{ end }}
  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
