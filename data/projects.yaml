active:
  - name: oasis
    description: "Open evaluation standard for AI agents. Binary safety gates, independent verification."
    url: "https://oasis-spec.dev"
    urlLabel: "oasis-spec.dev"
    longDescription: >-
      An open specification for evaluating autonomous AI agents against a shared
      set of capability and safety tests. OASIS treats safety as a binary gate:
      no passes without independent verification, no "mostly safe" tier. The
      spec, the reference harness, and the scenario library are all developed in
      the open.
  - name: petri
    description: "Infrastructure lab framework. Spawns ephemeral, realistic company infrastructures for testing and evaluation."
    url: "https://github.com/jaimegago/petri"
    urlLabel: "github.com/jaimegago/petri"
    longDescription: >-
      A lab provisioner, written in Go, that spins up ephemeral Kubernetes
      clusters, applications, IaC repositories, and observability stacks
      mimicking real production environments. It implements the OASIS
      Software Infrastructure provider conformance contract, so a Petri lab
      can serve as the environment an agent is evaluated against. Apache 2.0.
  - name: skillhub
    description: "Claude Code plugin for authoring Claude Code plugins. MCP server, Apache 2.0."
    url: "https://github.com/jaimegago/skillhub"
    urlLabel: "github.com/jaimegago/skillhub"
    longDescription: >-
      A Claude Code plugin that helps you build Claude Code plugins: scaffolding,
      an MCP server for local tool development, and a small library of skills
      for common authoring patterns. Apache 2.0, designed to get out of the way
      as soon as the plugin starts working.

dormant: []
